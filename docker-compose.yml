version: "3.9"

networks:
  wamcp:
    driver: bridge

volumes:
  wa-data:

services:
  bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    expose:
      - "8080"
    volumes:
      - wa-data:/app/store
    networks:
      - wamcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - wa-data:/app/store
    environment:
      - BRIDGE_URL=http://bridge:8080
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:-admin123}
      - SECRET_KEY=${SECRET_KEY:-changeme_use_a_long_random_string}
    depends_on:
      - bridge
    networks:
      - wamcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - wamcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    volumes:
      - wa-data:/app/store
    environment:
      - BRIDGE_URL=http://bridge:8080
      - DB_PATH=/app/store/messages.db
      - CLAUDE_PROXY_URL=${CLAUDE_PROXY_URL:-http://172.17.0.1:3456/v1}
      - MY_JID=${MY_JID:-919633652112@s.whatsapp.net}
      - SYSTEM_PROMPT=${SYSTEM_PROMPT:-}
      - AUTO_REPLY_ENABLED=${AUTO_REPLY_ENABLED:-true}
    depends_on:
      - bridge
    networks:
      - wamcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('/tmp/worker.pid') else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  mcp:
    build:
      context: ./whatsapp-mcp-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - wa-data:/app/store
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - DB_PATH=/app/store/messages.db
      - BRIDGE_URL=http://bridge:8080
    depends_on:
      - bridge
    networks:
      - wamcp
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8888:80"
    depends_on:
      - frontend
      - api
    networks:
      - wamcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
