version: "3.9"

networks:
  wamcp:
    driver: bridge

volumes:
  wa-data:

services:
  bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    expose:
      - "8080"
    volumes:
      - wa-data:/app/store
    networks:
      - wamcp
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - wa-data:/app/store
    environment:
      - BRIDGE_URL=http://bridge:8080
    depends_on:
      - bridge
    networks:
      - wamcp
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - wamcp
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "8888:80"
    depends_on:
      - frontend
      - api
    networks:
      - wamcp
    restart: unless-stopped
